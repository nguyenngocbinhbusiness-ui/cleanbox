name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install pyinstaller==6.16.0 pytest==9.0.1 pytest-qt==4.5.0 flake8==7.3.0 bandit==1.9.2

      - name: Lint src and tests
        run: python -m flake8 src tests --count --statistics

      - name: Run core quality gates
        run: python quality/verify_release.py --skip-flake8
